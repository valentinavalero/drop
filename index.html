<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<title>Login - DROP</title>
</head>

<body>

<div class="background"></div>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>

<div class="card">
    <img src="./img/DROP_logo-transparent.png" class="logo">
    <h2>Login</h2>

    <input type="email" id="emailLogin" placeholder="Email">
    <div class="senha-box">
    <input type="password" id="senhaLogin" placeholder="Senha">
    <i class="fa-solid fa-eye" onclick="toggleSenha('senhaLogin', this)"></i>
</div>

    <a href="cadastro.html" class="link">Não tem conta? <b>CRIAR</b></a>

    <button class="botao" onclick="login()">Acessar</button>
</div>

<script>
function login() {
    let email = document.getElementById("emailLogin").value.toLowerCase().trim();
    let senha = document.getElementById("senhaLogin").value;

    let usuario = JSON.parse(localStorage.getItem("usuarioDROP"));

    if(usuario && email === usuario.email && senha === usuario.senha){
        alert("Login realizado com sucesso!");
        window.location.href = "inicio.html";
    } else {
        alert("Email ou senha incorretos!");
    }
}

function toggleSenha(idCampo, icone){
    let campo = document.getElementById(idCampo);

    if(campo.type === "password"){
        campo.type = "text";
        icone.classList.remove("fa-eye");
        icone.classList.add("fa-eye-slash");
    } else {
        campo.type = "password";
        icone.classList.remove("fa-eye-slash");
        icone.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
