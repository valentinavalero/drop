<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Cadastro - DROP</title>
</head>

<body>

    <div class="background"></div>

    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>

    <div class="card">
        <img src="../img/DROP_logo-transparent.png" class="logo">
        <h2>Cadastro</h2>

        <input type="text" id="nome" placeholder="Nome">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="cpf" placeholder="CPF/CNPJ">
        <input type="tel" id="telefone" placeholder="Telefone">
        <div class="senha-box">
            <input type="password" id="senha" placeholder="Senha">
            <i class="fa-solid fa-eye" onclick="toggleSenha('senha', this)"></i>
        </div>

        <div class="login-link">
            Já possui uma conta? <a href="index.html">Faça LOGIN</a>
        </div>

        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <script src="../js/cadastro.js"></script>

</body>

</html>
