<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil do Usuário - DROP</title>
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="../css/navbar.css">


</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="inicio.html"><img class="logo" src="../img/DROP_logo-transparent.png"></a>
        <a href="perfil.html"><img class="perfil" src="https://cdn-icons-png.flaticon.com/512/12225/12225881.png"></a>
    </div>

    <div class="alinhando">

        <div class="container">

            <div class="topo">
                <h1>Meu Perfil</h1>
                <p>Informações do usuário cadastrado</p>

                <!-- FOTO DE PERFIL -->
                <img src="https://cdn-icons-png.flaticon.com/512/12225/12225881.png" alt="Foto de Perfil" class="foto">
            </div>

            <div class="conteudo">

                <div class="secao">
                    <h2>Dados Pessoais</h2>

                    <div class="info">


                        <div class="campo">
                            <span>Nome</span>
                            <strong id="perfilNome"></strong>
                        </div>

                        <div class="campo">
                            <span>Email</span>
                            <strong id="perfilEmail"></strong>
                        </div>

                        <div class="campo">
                            <span>CPF/CNPJ</span>
                            <strong id="perfilCpf"></strong>
                        </div>

                        <div class="campo">
                            <span>Telefone</span>
                            <strong id="perfilTelefone"></strong>
                        </div>

                    </div>
                </div>

                <div class="botoes">
                    <button onclick="sair()" class="sair">Sair</button>
                </div>

            </div>

        </div>

    </div>

    <script src="../js/perfil.js"></script>

</body>

</html>
