<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Reposição de Sangue</title>

    <link rel="stylesheet" href="../css/formHospitais.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <div class="alinha">
                <h1>Solicitação de Reposição</h1>
                <img class="logo" src="../img/DROP_logo.jpeg">
            </div>

            <p>Formulário para Hospitais e Unidades de Saúde</p>
        </div>

        <form id="formulario">

            <!-- PROGRESS -->
            <div class="progress-top">

                <div class="progress-info">
                    <span id="stepText">Passo 1 de 3</span>
                    <span>Progresso</span>
                </div>

                <div class="progress-bg">
                    <div class="progress-fill" id="progressBar"></div>
                </div>

            </div>

            <!-- PASSO 1 -->
            <div id="step1" class="form-section active">

                <h3>1. Identificação do Hospital</h3>

                <div class="grid">

                    <input type="text" placeholder="Nome do hospital" required>

                    <input type="text" placeholder="Responsável pela solicitação" required>

                    <input type="text" placeholder="Cargo">

                    <input type="tel" placeholder="Telefone" required>

                    <input type="email" placeholder="E-mail" required>

                </div>

            </div>

            <!-- PASSO 2 -->
            <div id="step2" class="form-section">

                <h3>2. Dados da Solicitação</h3>

                <label>Tipo:</label>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="tipo" value="Urgente" required>
                        Urgente
                    </label>

                    <label>
                        <input type="radio" name="tipo" value="Programada">
                        Programada
                    </label>
                </div>

                <br>

                <input type="date" required>

                <div id="justificativaBox" style="display:none; margin-top:15px;">
                    <textarea placeholder="Justifique a urgência..."></textarea>
                </div>

                <br><br>

                <h3>Informações do Sangue</h3>

                <div class="grid">

                    <select required>
                        <option value="">Tipo sanguíneo</option>
                        <option>O+</option>
                        <option>O-</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                    </select>

                    <input type="number" placeholder="Quantidade de bolsas" required>

                    <select class="full" required>
                        <option value="">Tipo de hemocomponente</option>
                        <option>Sangue total</option>
                        <option>Concentrado de hemácias</option>
                        <option>Plaquetas</option>
                        <option>Plasma</option>
                    </select>

                </div>

            </div>

            <!-- PASSO 3 -->
            <div id="step3" class="form-section">

                <h3>3. Local e Confirmação</h3>

                <div class="grid">

                    <input type="text" placeholder="Nome do hemocentro" required>

                    <input type="text" placeholder="Endereço" required>

                </div>

                <br>

                <textarea placeholder="Informações adicionais..."></textarea>

                <br><br>

                <label class="aceite-termo">
                    <input type="checkbox" required>
                    <span>Confirmo que as informações são verdadeiras</span>
                </label>

            </div>

            <!-- BOTÕES -->
            <div class="nav">

                <button type="button" class="prev hidden" id="btnPrev">
                    ← Anterior
                </button>

                <button type="button" class="next" id="btnNext">
                    Próximo →
                </button>

                <button type="submit" class="submit hidden" id="btnSubmit">
                    Enviar Solicitação
                </button>

            </div>

        </form>

    </div>

    <!-- POPUP -->
    <div id="popupSucesso" class="popup">

        <div class="popup-box">
            <h2>✅ Enviado com sucesso!</h2>
            <p>Redirecionando...</p>
        </div>

    </div>

    <script src="../js/formHospitais.js"></script>

</body>

</html>
