<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitação de Reposição de Sangue</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#f9fafb;
min-height:100vh;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

 .header {
            background: #dc2626;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .alinha {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 60px;
            border-radius: 50%;
        }

        .header p {
            margin-top: 10px;
            color: #fecaca;
        }

form{
padding:35px;
}

.section{
margin-bottom:30px;
}

h3{
font-size:24px;
margin-bottom:20px;
color:#1f2937;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1/-1;
}

label{
display:block;
font-size:14px;
margin-bottom:8px;
color:#374151;
font-weight:600;
}

input,select,textarea{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
font-size:15px;
outline:none;
}

textarea{
resize:vertical;
min-height:110px;
}

input:focus,select:focus,textarea:focus{
border-color:#ef4444;
box-shadow:0 0 0 3px rgba(239,68,68,.2);
}

.radio-group{
display:flex;
gap:20px;
margin-top:10px;
}

.radio-group label{
display:flex;
align-items:center;
gap:8px;
font-weight:400;
}

button{
border:none;
cursor:pointer;
padding:14px 24px;
border-radius:10px;
font-size:15px;
font-weight:600;
background:#dc2626;
color:white;
transition:.2s;
width:100%;
margin-top:10px;
}

button:hover{
background:#b91c1c;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:999;
}

.popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
width:320px;
animation:subir .4s ease;
}

.popup-box h2{
color:#16a34a;
margin-bottom:10px;
}

.popup-box p{
color:#6b7280;
}

@keyframes subir{
from{
transform:translateY(30px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}

form{
padding:20px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
            <div class="alinha">
                <h1>Solicitação de Reposição</h1>
                <img class="logo" src="./img/DROP_logo.jpeg">
            </div>
            <p>Formulário para Hospitais e Unidades de Saúde</p>
        </div>

<form id="formulario">

<div class="section">
<h3>Identificação do Hospital</h3>

<div class="grid">
<input type="text" placeholder="Nome do hospital" required>
<input type="text" placeholder="Responsável pela solicitação" required>

<input type="text" placeholder="Cargo">
<input type="tel" placeholder="Telefone" required>

<input type="email" placeholder="E-mail" required>
</div>
</div>

<div class="section">
<h3>Dados da Solicitação</h3>

<label>Tipo:</label>

<div class="radio-group">
<label><input type="radio" name="tipo" value="Urgente" required> Urgente</label>
<label><input type="radio" name="tipo" value="Programada"> Programada</label>
</div>

<br>

<input type="date" required>

<div id="justificativaBox" style="display:none; margin-top:15px;">
<textarea placeholder="Justifique a urgência..."></textarea>
</div>

</div>

<div class="section">
<h3>Informações do Sangue</h3>

<div class="grid">

<select required>
<option value="">Tipo sanguíneo</option>
<option>O+</option>
<option>O-</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="number" placeholder="Quantidade de bolsas" required>

<select class="full" required>
<option value="">Tipo de hemocomponente</option>
<option>Sangue total</option>
<option>Concentrado de hemácias</option>
<option>Plaquetas</option>
<option>Plasma</option>
</select>

</div>
</div>

<div class="section">
<h3>Local para Doação</h3>

<div class="grid">
<input type="text" placeholder="Nome do hemocentro" required>
<input type="text" placeholder="Endereço" required>
</div>

</div>

<div class="section">
<h3>Observações</h3>
<textarea placeholder="Informações adicionais..."></textarea>
</div>

<div class="section">
<label style="display:flex; gap:10px; align-items:center;">
<input type="checkbox" required style="width:auto;">
Confirmo que as informações são verdadeiras
</label>
</div>

<button type="submit">Enviar Solicitação</button>

</form>

</div>

<!-- POPUP -->
<div id="popupSucesso" class="popup">
<div class="popup-box">
<h2>✅ Enviado com sucesso!</h2>
<p>Redirecionando...</p>
</div>
</div>

<script>

// JUSTIFICATIVA
const radios = document.getElementsByName("tipo");
const box = document.getElementById("justificativaBox");

radios.forEach(radio=>{
radio.addEventListener("change",()=>{
if(radio.checked && radio.value==="Urgente"){
box.style.display="block";
}else{
box.style.display="none";
}
});
});

// SUBMIT
document.getElementById("formulario").addEventListener("submit",function(e){
e.preventDefault();

document.getElementById("popupSucesso").classList.add("show");

setTimeout(()=>{
window.location.href="inicio.html";
},2500);

});

</script>

</body>
</html>
